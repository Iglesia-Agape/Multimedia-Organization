<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Workspace - Control de Personal</title>
    <!-- Tailwind CSS para los estilos oscuros -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <!-- Tarjeta del Formulario de Configuración del Ministerio -->
    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-6 w-full max-w-md shadow-2xl shadow-purple-950/10">
        <div class="mb-6">
            <h3 class="text-sm font-bold text-white uppercase tracking-wider flex items-center gap-2">
                🎬 Vincular Miembro Profesional
            </h3>
            <p class="text-xs text-zinc-500 mt-1">El miembro recibirá una invitación automática por correo una vez registrado.</p>
        </div>
        
        <div class="space-y-4">
            <!-- Campo: Nombre -->
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase mb-1">Nombre Completo</label>
                <input type="text" id="nombreMiembro" placeholder="Ej. Alejandro Espinal" 
                       class="w-full bg-[#121214] border border-[#2a2a33] rounded-lg p-2.5 text-xs text-white placeholder-zinc-600 focus:outline-none focus:border-purple-500 transition-colors">
            </div>

            <!-- Campo: Correo Electrónico -->
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase mb-1">Correo Electrónico</label>
                <input type="email" id="correoMiembro" placeholder="ejemplo@correo.com" 
                       class="w-full bg-[#121214] border border-[#2a2a33] rounded-lg p-2.5 text-xs text-white placeholder-zinc-600 focus:outline-none focus:border-purple-500 transition-colors">
            </div>

            <!-- Campo: Espacio de Trabajo (Exclusivo para los 8 roles operativos estándar) -->
            <div>
                <label class="block text-xs font-semibold text-zinc-400 uppercase mb-1">Espacio de Trabajo</label>
                <select id="rolMiembro" class="w-full bg-[#121214] border border-[#2a2a33] rounded-lg p-2.5 text-xs text-zinc-300 focus:outline-none focus:border-purple-500 transition-colors cursor-pointer">
                    <option value="Audio">🔊 Audio / Mezcla en Vivo</option>
                    <option value="Transmisión">🎛️ Transmisión (ATEM / OBS)</option>
                    <option value="Camarografía">📹 Camarografía</option>
                    <option value="Proyección">🖥️ Proyección (ProPresenter)</option>
                    <option value="Luces">💡 Luces / Iluminación</option>
                    <option value="Diseño gráfico">🎨 Diseño gráfico</option>
                    <option value="Redes sociales">📱 Redes sociales</option>
                    <option value="Fotografía">📸 Fotografía</option>
                </select>
            </div>

            <!-- Botón de Acción -->
            <button id="btnVincular" onclick="agregarMiembroEquipo()" 
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg p-3 text-xs transition-all cursor-pointer shadow-lg shadow-purple-900/20 active:scale-[0.98]">
                Vincular al Espacio de Control
            </button>
        </div>
    </div>

    <!-- Lógica de Control y Supabase -->
    <script>
    // NOTA: La función frontend 'enviarNotificacionPorCorreo' ha sido removida por completo.
    // El flujo de correo se delega al Trigger seguro de la base de datos de Supabase.

    async function agregarMiembroEquipo() {
        const nombreInput = document.getElementById('nombreMiembro');
        const correoInput = document.getElementById('correoMiembro');
        const rolInput = document.getElementById('rolMiembro');
        const btnVincular = document.getElementById('btnVincular');

        const nombre = nombreInput.value.trim();
        const correo = correoInput.value.trim();
        const rol = rolInput.value;

        // Validación de campos vacíos en el cliente
        if (!nombre || !correo) {
            alert('Por favor, ingresa el nombre y el correo electrónico del miembro.');
            return;
        }

        // Bloqueo visual del botón durante la transacción
        btnVincular.disabled = true;
        btnVincular.innerText = 'Insertando en base de datos...';

        try {
            // Comunicación directa con tu cliente de Supabase (asegúrate de que 'supabase' esté inicializado en tu script global)
            const { data, error } = await supabase
                .from('miembros')
                .insert([
                    { nombre: nombre, correo: correo, rol: rol }
                ]);

            if (error) throw error;

            // Al completarse el INSERT, el Trigger de Supabase se activa y le ordena a Resend despachar la plantilla HTML de inmediato
            alert(`¡Vinculación Exitosa!\n${nombre} ha sido agregado a ${rol}. El correo de invitación se está enviando de servidor a servidor.`);
            
            // Limpieza del formulario para el siguiente registro
            nombreInput.value = '';
            correoInput.value = '';
            
        } catch (err) {
            console.error('Error detectado en la transacción:', err);
            // Manejo de errores amigable si se violan restricciones del servidor (como correos duplicados o roles prohibidos)
            alert('Error al registrar en Supabase: ' + (err.message || err));
        } finally {
            // Restauración del estado del botón
            btnVincular.disabled = false;
            btnVincular.innerText = 'Vincular al Espacio de Control';
        }
    }
    </script>
</body>
</html>
